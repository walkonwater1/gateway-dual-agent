# Agent Demo 配置
# 复制为 config.local.yaml 并填入真实值（该文件不会被 git 追踪）

# MQTT Broker（机器人上 mosquitto 的地址和端口）
mqtt:
  host: "127.0.0.1"     # 改为机器人实际 IP
  port: 8899

# LLM 配置（用于意图识别和对话）
llm:
  base_url: "https://api.openai.com/v1"   # 或公司内部的 LLM 地址
  api_key: "sk-xxxx"                        # 填入真实 key
  model: "gpt-4o"                           # 或公司提供的模型名
  temperature: 0.3
  max_tokens: 512

# 日志级别: DEBUG / INFO / WARNING / ERROR
log_level: "INFO"

# --------------------------------------------------------------------------
# Gateway 模块配置
# --------------------------------------------------------------------------
gateway:
  # 路由策略 YAML 文件路径（相对 agent_demo 目录）
  routes_yaml: "config/routes.yaml"

  # 模块开关（false 则跳过该处理步骤）
  modules:
    input_adapter: true
    session_router: true
    priority_manager: true
    safety_gate: true
    trace_logger: true
    conflict_resolver: true
    event_bus: false             # Runtime 间事件通讯（Phase 3）
    result_aggregator: false     # 多 Runtime 结果汇聚（Phase 3）

# --------------------------------------------------------------------------
# EventWatcher — MQTT 日志轮询 + 事件驱动
# 监听机器人 info/often 状态消息，检测模式（低电量/过热），生成事件喂给 Gateway
# --------------------------------------------------------------------------
event_watcher:
  enabled: false                 # 默认关闭，需要时改为 true
  rules_yaml: "config/event_rules.yaml"
  # 测试模拟: 终端输入 "电量低于15%" 即可模拟低电量事件（不依赖 MQTT）
